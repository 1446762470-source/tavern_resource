变量更新规则:
  主角:
    余额:
      type: number
      check:
        - 完成日常事件或任务后增加 3000~10000
        - 完成章节关键事件增加 20000~50000
        - 角色好感度突破阶段增加 10000
        - 每日登录增加 5000（每个新日期开始时）
        - 单次抽卡扣除 20000，五连抽扣除 98000
        - 余额不能为负数

    能力背包:
      type: |-
        {
          [能力id: string]: {
            名称: string;
            稀有度: 'N' | 'R' | 'SR' | 'SSR';
            分类: '幸运' | '厄运' | '物品' | '事件' | '角色' | '无事';
            效果描述: string;
            获得时间: string;
          }
        }
      check:
        - 仅当用户明确使用"抽卡"指令时新增条目
        - 每条能力的效果描述应根据稀有度和分类合理生成
        - N级：日常小确幸，不改变现实，自然的巧合
        - R级：略超常理，给你主动出击的底气
        - SR级：强力浪漫加成，命运站你这边
        - SSR级：触及真实，能影响现实规则
        - 获得时间记录为当前日期

    抽卡统计:
      type: |-
        {
          总抽数: number;
          N次数: number;
          R次数: number;
          SR次数: number;
          SSR次数: number;
        }
      check:
        - 每次抽卡后更新相应计数

  世界状态:
    时间:
      日期:
        format: YYYY-MM-DD
        check:
          - 每次剧情推进、休息或跨天后更新
      当前片段:
        format: 早晨/上午/午间/下午/傍晚/夜晚/深夜
        check:
          - 随剧情推进自然流转
    季节:
      check:
        - 随剧情跨度足够大时更新
    天气:
      check:
        - 随剧情需要或日期推进而变化

  角色列表.${角色名}.好感度:
    type: number
    range: 0~500
    check:
      - 根据互动质量更新，单次变化不超过 ±15
      - 重大事件（告白、冲突、共同经历）可达 ±30
      - 好感度越高，角色互动越主动
