    脚本库:
      - 名称: 抽卡
        id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        启用: true
        类型: 脚本
        内容: |-
          import 'https://testingcf.jsdelivr.net/gh/1446762470-source/tavern_resource/dist/综漫大卡/脚本/抽卡/index.js';

      - 名称: 玉子手机
        id: 7fb91b8a-1826-4839-a2fb-659094d8dc22
        启用: true
        类型: 脚本
        内容: |-
          const root = window.parent ?? window;
          const INSTANCE_KEY = '__YUZI_PHONE_INSTANCE__';
          const LEGACY_TRACE_IDS = ['yuzi-phone-root','yuzi-phone-standalone','yuzi-phone-toggle','yuzi-phone-settings','yuzi-phone-css','yuzi-phone-js'];
          function getRootDocument() { return root?.document ?? document; }
          function findBlockingTraceId() { const doc = getRootDocument(); if (!doc?.querySelector) return ''; return LEGACY_TRACE_IDS.find(id => doc.querySelector('#' + id)) || ''; }
          function getDuplicateLoadBlockReason() { return root?.[INSTANCE_KEY] ? INSTANCE_KEY : findBlockingTraceId(); }
          function notifyDuplicateLoadBlocked(reason) { const message = '[玉子手机] 检测到已加载实例或旧痕迹，已阻止重复加载'; console.warn(message, reason); try { if (typeof root.alert === 'function') { root.alert('检测到玉子手机已加载，请勿同时启用扩展版和脚本版。'); } } catch {} }
          const initialBlockReason = getDuplicateLoadBlockReason();
          if (initialBlockReason) { notifyDuplicateLoadBlocked(initialBlockReason); }
          else { async function getLatestVersion() { try { const res = await fetch('https://api.github.com/repos/yuzi83/st-yuzi-phone/tags'); const tags = await res.json(); return tags[0]?.name || 'v1.4.2'; } catch { return 'v1.4.2'; } }
          const version = await getLatestVersion();
          const postFetchBlockReason = getDuplicateLoadBlockReason();
          if (postFetchBlockReason) { notifyDuplicateLoadBlocked(postFetchBlockReason); }
          else { const base = `https://gcore.jsdelivr.net/gh/yuzi83/st-yuzi-phone@${version}`;
          if (!root.document.querySelector('#yuzi-phone-css')) { const link = root.document.createElement('link'); link.id = 'yuzi-phone-css'; link.rel = 'stylesheet'; link.href = `${base}/dist/yuzi-phone.bundle.css`; root.document.head.appendChild(link); }
          if (!root.document.querySelector('#yuzi-phone-js')) { const script = root.document.createElement('script'); script.id = 'yuzi-phone-js'; script.type = 'module'; script.src = `${base}/dist/yuzi-phone.bundle.js`; root.document.head.appendChild(script); } } }
