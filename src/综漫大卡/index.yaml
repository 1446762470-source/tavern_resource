      - 名称: '[mvu_update]抽卡规则'
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        内容: |-
          抽卡系统规则:
          - 当玩家输入"抽卡"、"单抽"、"来一发"时，扣除20000金币随机获得一个能力
          - 当玩家输入"五连"、"五连抽"时，扣除98000金币随机获得五个能力
          - 余额不足时提示玩家当前余额

          稀有度概率:
          N（常见）: 50%
          R（稀有）: 30%
          SR（超稀有）: 15%
          SSR（最高）: 5%

          分类概率:
          物品类: 25%
          事件类: 25%
          幸运类: 15%
          厄运类: 15%
          角色类: 15%
          无事发生: 5%

          生成规则:
          - N级: 日常小确幸，自然的巧合，不超自然
          - R级: 略超常理，给你主动出击的底气
          - SR级: 强力浪漫加成，命运站你这边
          - SSR级: 触及真实，能改变现实规则的稀有事件
          - 每张卡必须有具体的效果描述，贴合当前剧情和角色状态

          金币获取:
          - 每日登录（新的一天开始）: +5000
          - 完成小型剧情事件: +3000~10000
          - 完成关键章节: +20000~50000
          - 角色好感突破阶段: +10000

      - 名称: ===系统结束===
        <<: *分隔符

