扩展字段:
  正则:
    # 开场设定 — 将占位符替换为前端界面
    - 正则名称: '[界面]开场设定'
      id: b50d0bed-ff40-4a25-9ada-14feb4283400
      启用: true
      查找表达式: <OpeningSetup/>
      内容: |-
        ```
        <body>
        <iframe src="https://testingcf.jsdelivr.net/gh/1446762470-source/tavern_resource/dist/%E6%88%91%E7%9A%84%E6%97%A5%E5%B8%B8/%E7%95%8C%E9%9D%A2/%E5%BC%80%E5%9C%BA%E8%AE%BE%E5%AE%9A/index.html" style="width:100%;height:520px;border:none;"></iframe>
        </body>
        ```
      来源:
        用户输入: false
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    # 任务卡片美化 — 将 <daily_tasks> 替换为带样式的任务面板
    - 正则名称: '[显示]任务卡片'
      id: e8a1c3f0-2b4d-4e6a-9c8f-1d3b5e7f9a2c
      启用: true
      查找表达式: /<daily_tasks>([\s\S]*?)<\/daily_tasks>/gs
      内容: |-
        <div style="
          background:linear-gradient(160deg, #1e1b2e 0%, #252136 100%);
          border:1px solid #3d3558;
          border-left:3px solid #c9a44b;
          border-radius:4px;
          padding:14px 16px;
          margin:10px 0;
          font-family: 'Noto Serif SC', 'PingFang SC', sans-serif;
        ">
          <div style="
            font-size:0.85em;
            font-weight:600;
            color:#c9a44b;
            margin-bottom:10px;
            letter-spacing:0.05em;
            border-bottom:1px solid #3d3558;
            padding-bottom:8px;
          ">◆ 今日任务</div>
          <div style="font-size:0.82em;color:#c8c0dc;line-height:1.8;white-space:pre-line;">$1</div>
        </div>
      来源:
        用户输入: false
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    # 命运卡牌美化 — 将 <fate_card> 替换为带样式的卡牌面板
