# ============================================================
# 自定义数据库表格：角色数值表
# 用于 AutoCardUpdater 插件（需 SQLite 模式）
# 对应 MVU 变量中的 stat_data.角色列表
# ============================================================

名称: 角色数值表
表格类型: 自定义多行表
启用: true

# ---- DDL ----
# 在 AutoCardUpdater 设置 → 自定义表格 → 新建表格中粘贴以下 SQL

DDL: |-
  CREATE TABLE character_metrics ( -- 角色数值表
    row_id INTEGER PRIMARY KEY, -- 行号
    角色名 TEXT NOT NULL UNIQUE, -- 角色名
    好感度 INTEGER NOT NULL DEFAULT 0 CHECK(好感度 >= 0 AND 好感度 <= 500), -- 好感度
    了解度 INTEGER NOT NULL DEFAULT 0 CHECK(了解度 >= 0 AND 了解度 <= 100), -- 了解度
    自我理解度 INTEGER NOT NULL DEFAULT 0 CHECK(自我理解度 >= 0 AND 自我理解度 <= 100), -- 自我理解度
    灵魂共鸣度 INTEGER NOT NULL DEFAULT 0 CHECK(灵魂共鸣度 >= 0 AND 灵魂共鸣度 <= 100) -- 灵魂共鸣度
  );

# ---- Note ----
# 粘贴到"备注"字段

Note: |-
  记录每个角色对<user>的四维态度数值。角色在剧情中首次出场时添加，之后随剧情发展更新。
  - 列0: 行号 - 自动递增的行标识
  - 列1: 角色名 - 角色的唯一标识名称（如"雪之下雪乃"）
  - 列2: 好感度 - 角色对<user>的态度（0~500，五阶段）
  - 列3: 了解度 - 角色对<user>的了解程度（0~100，好感度天花板）
  - 列4: 自我理解度 - 角色对不完美自我的顺应和认知（0~100）
  - 列5: 灵魂共鸣度 - 与<user>共度余生的驱动力（0~100，了解度+自我理解度均≥70前锁定为0）

# ---- 触发器 ----

触发器:
  Init:
    规则: |-
      此表初始为空。角色在剧情中首次出场时，由 AI 通过 <tableEdit> 插入。
      初始值：好感度=0, 了解度=0, 自我理解度=0, 灵魂共鸣度=0。

  Insert:
    规则: |-
      当角色首次在剧情中出场并与<user>产生交互时，插入新行。
      所有数值初始为 0，之后随剧情更新。
      示例 SQL：INSERT INTO 角色数值表 (角色名, 好感度, 了解度, 自我理解度, 灵魂共鸣度) VALUES ('雪之下雪乃', 0, 0, 0, 0);

  Update:
    规则: |-
      每次角色与<user>产生有意义的交互后，AI 在回复中评估并更新。
      必须遵守以下约束：
      - 好感度 ≤ 了解度 × 5
      - 单次好感度变化 ≤ ±10
      - 单次了解度变化 ≤ ±6
      - 单次自我理解度变化 ≤ ±8
      - 单次灵魂共鸣度变化 ≤ ±4
      - 灵魂共鸣度仅在了解度≥70且自我理解度≥70时可 > 0
      示例 SQL：UPDATE 角色数值表 SET 好感度 = 42, 了解度 = 12 WHERE 角色名 = '雪之下雪乃';

  Delete:
    规则: |-
      通常不删除角色行。仅在角色永久死亡或彻底离开故事时可删除。
      示例 SQL：DELETE FROM 角色数值表 WHERE 角色名 = '某角色';
