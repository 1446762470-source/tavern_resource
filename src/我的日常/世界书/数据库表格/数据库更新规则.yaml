名称: '[tableEdit]数据库更新规则'
启用: true
激活策略:
  类型: 蓝灯
插入位置:
  类型: 指定深度
  角色: 系统
  深度: 0
  顺序: 14800

内容: |
  数据库更新规则:

    主角状态表:
      金钱:
        type: number
        range: "≥ 0"
        update: UPDATE 主角状态表 SET 金钱 = 金钱 + ${变化量} WHERE row_id = 1;
        check:
          - 任务完成时根据奖励增加
          - 刷新任务/额外抽卡时花费 500 円
          - 日常消费扣除少量金额
      当前时间:
        format: 第${N}天 ${时段}
        check:
          - 每次事件推进、休息或剧情日更替后更新
      当前地点:
        check:
          - 主角移动到新场景时更新

    角色数值表:
      ${角色名}.好感度:
        type: number
        range: 0~500
        update: UPDATE 角色数值表 SET 好感度 = 好感度 + ${变化量} WHERE 角色名 = '${角色名}';
        category:
          0~100: 戒备森严
          101~200: 戒备渐消
          201~300: 毫无防备，相处愉快
          301~400: 暗生情愫，魂萦梦绕
          401~500: 亲密无间
        check:
          - 正面互动 +1~+8，负面互动 -1~-5
          - 单次变化 ≤ ±10
          - 好感度 ≤ 了解度 × 5

      ${角色名}.了解度:
        type: number
        range: 0~100
        update: UPDATE 角色数值表 SET 了解度 = 了解度 + ${变化量} WHERE 角色名 = '${角色名}';
        category:
          0~50: 浅层了解
          51~100: 深层理解
        check:
          - 表层信息 +1~+2，性格/习惯 +2~+4，触及深层 +4~+6
          - 单次变化 ≤ ±6
          - 不会自动增长——必须确获知新信息

      ${角色名}.自我理解度:
        type: number
        range: 0~100
        update: UPDATE 角色数值表 SET 自我理解度 = 自我理解度 + ${变化量} WHERE 角色名 = '${角色名}';
        category:
          0~50: 逐渐顺应
          51~100: 接纳自我
        check:
          - 意外暴露脆弱 +1~+3，被接纳 +3~+6，主动袒露 +5~+8
          - 单次变化 ≤ ±8

      ${角色名}.灵魂共鸣度:
        type: number
        range: 0~100
        update: UPDATE 角色数值表 SET 灵魂共鸣度 = 灵魂共鸣度 + ${变化量} WHERE 角色名 = '${角色名}';
        category:
          0: 未解锁
          1~30: 萌芽
          31~60: 确认
          61~100: 坚定
        check:
          - 了解度 ≥ 70 且 自我理解度 ≥ 70 才可 > 0
          - 解锁后不可逆
          - 重大事件 +1~+3，主动选择<user> +2~+4，触及灵魂 +1~+2
          - 单次变化 ≤ ±4
          - 极慢增长，只有里程碑式时刻才动

    主角背包表:
      物品:
        insert: INSERT INTO 主角背包表 (物品名称, 物品描述, 数量, 物品类型) VALUES ('${名称}', '${描述}', ${数量}, '${类型}');
        update: UPDATE 主角背包表 SET 数量 = ${数量} WHERE 物品名称 = '${名称}';
        delete: DELETE FROM 主角背包表 WHERE 物品名称 = '${名称}';
        check:
          - 获得新物品 INSERT，已有物品 UPDATE 数量 +N
          - 使用消耗品数量 -1，归零 DELETE
          - 超自然物品记录使用次数，耗尽 DELETE
