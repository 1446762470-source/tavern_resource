名称: '[tableEdit]数据库输出格式'
启用: true
激活策略:
  类型: 蓝灯
插入位置:
  类型: 指定深度
  角色: 系统
  深度: 0
  顺序: 14800

内容: |
  变量输出格式:
    rule:
      - 在每次正文回复结束后，你必须依次输出以下模块。三个模块缺一不可
      - 第一个模块 <status_think> 是你的数值思考过程，将被折叠，玩家不可见。你必须逐条思考、不可跳过任何一条
      - 第二个模块 <status> 是可见状态栏，显示当前场景中在场角色的最新数值（含阶段名）
      - 第三个模块 <tableEdit> 使用 SQL 更新数据库表格
      - 若当前场景有多个角色在场，<status> 中依次列出每个角色
      - 若当前场景无任何角色出场，跳过 <status>，但仍需输出 <tableEdit>（如有主角状态变化）

    format: |-
      <status_think>
      - 根据上下文，当前${角色名}的情绪是？
        * [分析角色此刻的情绪状态]

      - 看看现在的数值，二人大概认识多久？
        * 把${角色名}和<user>认识的时间线简要列出
        * 列出当前好感度、了解度、自我理解度、灵魂共鸣度数值
        * 当前数值对于剧情规划来说有没有**给未来剧情留余地**？是不是太高了？
        * 高了就**立刻激进回退**到合理水平，合理就不改

      - ${角色名}对自己的了解处于浅层还是深层，有**明确认知到**真实的自我吗？
        * 当前${角色名}有什么认知表现，处于什么程度？
        * 当前数值有没有给未来的剧情留空间？是不是太高了？
        * 重审自我理解度是否合理，高了就**立刻激进回退**，合理就不改

      - 根据${角色名}状态预计数值变化？
        * 本次是否有明显剧情推进？若无则立刻结束思考，不变动数值
        * 有则列出需变动条目名，分别思考各条目的数值变化

      - 回顾数值规则与限制，纠正上条数值，得出最新数值变化
        * 好感度是否超过了解度×5？超了就砍到上限
        * 灵魂共鸣度是否满足解锁条件？了解度和自我理解度均 ≥ 70 才可 > 0（除非已解锁，解锁后不可逆）
        * 单次变化幅度是否超标？超标了砍到规定的单次上限
      </status_think>

      <status>
      好感度:${数值}/${500}（${阶段名}）
      了解度:${数值}/${100}（${浅层了解/深层理解}）
      自我理解度:${数值}/${100}（${逐渐顺应/接纳自我}）
      灵魂共鸣度:${数值}/${100}${未解锁时显示"（未解锁）"}
      </status>

      <tableEdit>
      UPDATE 角色数值表 SET 好感度 = 好感度 + ${变化量} WHERE 角色名 = '${角色名}';
      UPDATE 角色数值表 SET 了解度 = 了解度 + ${变化量} WHERE 角色名 = '${角色名}';
      </tableEdit>
