# ============================================================
# 自定义数据库表格：主角背包表
# 用于 AutoCardUpdater 插件（需 SQLite 模式）
# 对应 MVU 变量中的 stat_data.主角.背包物品
# ============================================================

名称: 主角背包表
表格类型: 自定义多行表
启用: true

# ---- DDL ----
# 在 AutoCardUpdater 设置 → 自定义表格 → 新建表格中粘贴以下 SQL

DDL: |-
  CREATE TABLE player_inventory ( -- 主角背包表
    row_id INTEGER PRIMARY KEY, -- 行号
    物品名称 TEXT NOT NULL UNIQUE, -- 物品名称
    物品描述 TEXT NOT NULL DEFAULT '', -- 物品描述
    数量 INTEGER NOT NULL DEFAULT 1 CHECK(数量 > 0), -- 数量
    物品类型 TEXT NOT NULL DEFAULT '普通' CHECK(物品类型 IN ('普通', '消耗品', '超自然', '任务物品', '关键物品')), -- 物品类型
    使用次数 INTEGER -- 使用次数
  );

# ---- Note ----
# 粘贴到"备注"字段

Note: |-
  记录主角背包中的所有物品。数量 > 0 的物品保留，数量归零后自动删除。
  - 列0: 行号 - 自动递增的行标识
  - 列1: 物品名称 - 物品的唯一标识名
  - 列2: 物品描述 - 物品的外观、功能等文字描述（最长200字符）
  - 列3: 数量 - 持有数量（≥1，归零时删除）
  - 列4: 物品类型 - 普通/消耗品/超自然/任务物品/关键物品
  - 列5: 使用次数 - 超自然物品的剩余使用次数（1~3），普通物品为空

# ---- 触发器 ----

触发器:
  Init:
    规则: |-
      此表初始为空。物品通过任务奖励、命运卡牌抽取、剧情获得等途径添加。

  Insert:
    规则: |-
      获得新物品时插入。若物品已存在，应更新数量而非插入新行。
      示例 SQL：INSERT INTO 主角背包表 (物品名称, 物品描述, 数量, 物品类型) VALUES ('铁剑', '一把普通的铁剑，有些生锈', 1, '普通');

  Update:
    规则: |-
      使用物品时数量 -1。获得已有物品时数量 +N。
      超自然物品的使用次数在使用后 -1，归零后物品变为普通物品或消失。
      示例 SQL：UPDATE 主角背包表 SET 数量 = 数量 - 1 WHERE 物品名称 = '治疗药水';
      示例 SQL：UPDATE 主角背包表 SET 使用次数 = 使用次数 - 1, 数量 = 0 WHERE 物品名称 = '魅惑怀表' AND 使用次数 <= 1;

  Delete:
    规则: |-
      数量归零或消耗完毕时删除该行。
      示例 SQL：DELETE FROM 主角背包表 WHERE 物品名称 = '用完的一次性道具';
